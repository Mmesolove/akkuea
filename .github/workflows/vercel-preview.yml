name: Vercel Preview Deployment

# Deploy a Vercel preview URL for every pull request targeting develop.
# Requires the following repository secrets to be configured:
#   VERCEL_TOKEN       – Vercel personal access token (or CI token)
#   VERCEL_ORG_ID     – Vercel team/organisation ID
#   VERCEL_PROJECT_ID – Vercel project ID for the webapp

on:
  pull_request:
    branches:
      - develop
    paths:
      - "apps/webapp/**"
      - ".github/workflows/vercel-preview.yml"

concurrency:
  group: vercel-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy Preview to Vercel
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write   # needed to post the preview URL comment
      contents: read

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Bun setup ───────────────────────────────────────────────────────
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ── 3. Dependency cache ────────────────────────────────────────────────
      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # ── 4. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ── 5. Type-check ──────────────────────────────────────────────────────
      - name: Type checking
        working-directory: apps/webapp
        run: bun run type-check

      # ── 6. Lint ────────────────────────────────────────────────────────────
      - name: ESLint
        working-directory: apps/webapp
        run: bun run lint

      # ── 7. Install Vercel CLI ──────────────────────────────────────────────
      - name: Install Vercel CLI
        run: bun add --global vercel@latest

      # ── 8. Pull Vercel project settings ───────────────────────────────────
      - name: Pull Vercel environment & project settings
        working-directory: apps/webapp
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull \
            --yes \
            --environment=preview \
            --token="${VERCEL_TOKEN}"

      # ── 9. Build for Vercel ────────────────────────────────────────────────
      - name: Build project artifacts
        working-directory: apps/webapp
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          # Always enable mock layer for preview builds
          NEXT_PUBLIC_USE_MOCK: "true"
        run: |
          vercel build \
            --token="${VERCEL_TOKEN}"

      # ── 10. Deploy to Vercel (preview) ─────────────────────────────────────
      - name: Deploy to Vercel
        id: vercel-deploy
        working-directory: apps/webapp
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          DEPLOY_URL=$(vercel deploy \
            --prebuilt \
            --token="${VERCEL_TOKEN}" \
            2>&1 | tail -1)
          echo "deploy_url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
          echo "Preview URL: ${DEPLOY_URL}"

      # ── 11. Comment preview URL on PR ──────────────────────────────────────
      - name: Comment preview URL on pull request
        uses: actions/github-script@v7
        with:
          script: |
            const deployUrl = '${{ steps.vercel-deploy.outputs.deploy_url }}';
            const prNumber  = context.payload.pull_request.number;
            const sha       = context.payload.pull_request.head.sha.slice(0, 7);

            const body = [
              '## 🚀 Vercel Preview Deployment',
              '',
              `| | |`,
              `|---|---|`,
              `| **Preview URL** | [${deployUrl}](${deployUrl}) |`,
              `| **Commit** | \`${sha}\` |`,
              `| **Status** | ✅ Ready |`,
              `| **Mock layer** | ✅ Enabled (\`NEXT_PUBLIC_USE_MOCK=true\`) |`,
              '',
              '> This preview uses the MSW mock data layer — no backend connection required.',
            ].join('\n');

            // Find and update an existing bot comment, or create a new one
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.data.find(
              (c) => c.user?.type === 'Bot' && c.body?.includes('Vercel Preview Deployment'),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
